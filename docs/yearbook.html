<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 青春纪念册</title>
<meta name="theme-color" content="#e892a8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="纪念册">
<link rel="manifest" href="/yearbook/manifest.json">
<style>
/* ============================================ */
/*  变量 & 基础                                   */
/* ============================================ */
:root {
  --pink:      #e892a8;
  --pink-soft: #fce4ec;
  --purple:    #b8a2e8;
  --purple-soft:#ede4f6;
  --cream:     #fff8f5;
  --text:      #4a3f52;
  --text-light:#8a7f92;
  --white:     #ffffff;
  --card-bg:   rgba(255,255,255,0.78);
  --shadow:    0 4px 24px rgba(180,140,160,0.12);
  --shadow-lg: 0 12px 40px rgba(180,140,160,0.18);
  --radius:    20px;
  --radius-sm: 12px;
  --transition: 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "PingFang SC","Microsoft YaHei",-apple-system,sans-serif;
  background: linear-gradient(160deg, #fef5f8 0%, #faf0f8 30%, #f5f0fd 60%, #fef9f6 100%);
  color: var(--text); min-height:100vh; line-height:1.6; overflow-x:hidden;
}

/* ============================================ */
/*  背景装饰                                     */
/* ============================================ */
.bg-stars { position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden; }
.star {
  position:absolute;font-size:16px;
  animation:floatStar 6s ease-in-out infinite;opacity:0.45;
}
.star:nth-child(1){top:6%;left:5%;animation-delay:0s;font-size:20px}
.star:nth-child(2){top:10%;left:86%;animation-delay:1.2s;font-size:15px}
.star:nth-child(3){top:42%;left:91%;animation-delay:2.4s;font-size:18px}
.star:nth-child(4){top:68%;left:7%;animation-delay:3.6s;font-size:14px}
.star:nth-child(5){top:80%;left:76%;animation-delay:4.8s;font-size:22px}
.star:nth-child(6){top:20%;left:44%;animation-delay:1.8s;font-size:14px}
.star:nth-child(7){top:55%;left:52%;animation-delay:3.0s;font-size:17px}
.star:nth-child(8){top:88%;left:32%;animation-delay:5.2s;font-size:19px}
@keyframes floatStar {
  0%,100%{transform:translateY(0)rotate(0deg)scale(1)}
  33%{transform:translateY(-16px)rotate(10deg)scale(1.12)}
  66%{transform:translateY(7px)rotate(-6deg)scale(0.93)}
}
.glow-1,.glow-2{position:fixed;border-radius:50%;filter:blur(130px);opacity:0.28;pointer-events:none;z-index:0}
.glow-1{width:500px;height:500px;background:radial-gradient(circle,#fdd4e0 0%,transparent 70%);top:-120px;left:-80px}
.glow-2{width:420px;height:420px;background:radial-gradient(circle,#dcd0f8 0%,transparent 70%);bottom:-100px;right:-60px}

/* ============================================ */
/*  主容器                                       */
/* ============================================ */
.container{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:24px 20px 60px}

/* ============================================ */
/*  导航栏                                       */
/* ============================================ */
.navbar {
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;margin-bottom:28px;
  background:var(--card-bg);backdrop-filter:blur(20px);
  border-radius:var(--radius);box-shadow:var(--shadow);
  flex-wrap:wrap;gap:12px;
}
.nav-title {
  font-size:20px;font-weight:700;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-user{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-light)}
.nav-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink-soft),var(--purple-soft));
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.btn{
  padding:8px 20px;border-radius:24px;border:none;
  font-size:13.5px;font-weight:600;cursor:pointer;
  transition:all var(--transition);font-family:inherit;
}
.btn-outline{background:transparent;color:var(--purple);border:1.5px solid var(--purple)}
.btn-outline:hover{background:var(--purple-soft)}
.btn-primary{
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:#fff;box-shadow:0 4px 14px rgba(200,140,170,0.3);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,140,170,0.4)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-back{background:transparent;color:var(--text-light);border:1.5px solid #e0d8e8}
.btn-back:hover{background:#f5f0f8}
.btn-logout{background:transparent;color:#c06070;border:1.5px solid #e0c0c8;padding:8px 16px;border-radius:24px;cursor:pointer;font-size:13px;font-family:inherit;transition:all var(--transition)}
.btn-logout:hover{background:#fff0f2}

/* ============================================ */
/*  登录页                                       */
/* ============================================ */
.login-card{
  background:var(--card-bg);backdrop-filter:blur(20px);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  padding:44px 40px;max-width:560px;margin:40px auto;text-align:center;
}
.login-card h2{
  font-size:26px;margin-bottom:6px;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-sub{font-size:14px;color:var(--text-light);margin-bottom:28px}
.login-tabs{display:flex;gap:0;margin-bottom:24px;background:#f5f0f8;border-radius:24px;padding:4px}
.login-tab{flex:1;padding:10px;border:none;border-radius:22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all var(--transition);background:transparent;color:var(--text-light)}
.login-tab.on{background:#fff;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.08)}

.login-form{text-align:left;margin-bottom:10px}
.login-form label{display:block;font-size:13px;font-weight:700;margin-bottom:5px;color:var(--text)}
.login-form input,.login-form select{
  width:100%;padding:12px 16px;border-radius:24px;
  border:1.5px solid #e0d8e8;font-size:14px;font-family:inherit;
  outline:none;margin-bottom:14px;transition:border var(--transition);
}
.login-form input:focus,.login-form select:focus{border-color:var(--purple)}
.form-row{display:flex;gap:10px}
.form-row>*{flex:1}
.error-msg{color:#d06070;font-size:12px;text-align:center;margin:8px 0;min-height:18px}

.divider{
  display:flex;align-items:center;gap:14px;margin:24px 0;
  color:var(--text-light);font-size:12px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e8e0ec}

.existing-list{display:flex;flex-direction:column;gap:8px}
.existing-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.6);border:1.5px solid transparent;
  cursor:pointer;transition:all var(--transition);text-align:left;
}
.existing-item:hover{border-color:var(--pink);background:var(--pink-soft);transform:translateX(4px)}
.existing-item .ei-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink-soft),var(--purple-soft));
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.existing-item .ei-name{font-weight:600;font-size:14px}
.existing-item .ei-class{font-size:12px;color:var(--text-light)}
.existing-item.seed{cursor:default;opacity:0.7}
.existing-item.seed:hover{border-color:transparent;background:rgba(255,255,255,0.6);transform:none}
.seed-badge{font-size:10px;background:var(--purple-soft);color:var(--purple);padding:2px 8px;border-radius:10px}

/* ============================================ */
/*  大厅 — 3D 球体 + 背景照片                    */
/* ============================================ */
.hall-scene{
  position:relative;width:100%;max-width:700px;margin:0 auto;
  
}
.hall-photos{position:absolute;inset:0;z-index:0}
.hall-photo{
  position:absolute;inset:0;opacity:0;transition:opacity 2.5s ease-in-out;
  background-size:cover;background-position:center;
  filter:blur(18px) brightness(0.75);
}
.hall-photo.on{opacity:1}
.sphere-wrap{position:absolute;inset:0;z-index:1}
.sphere-wrap canvas{display:block;width:100%;height:100%}
.hall-hint{text-align:center;margin-top:14px;font-size:13px;color:var(--text-light)}
.guest-banner{
  text-align:center;padding:14px 20px;margin-bottom:12px;font-size:14px;color:#fff;
  background:linear-gradient(135deg,rgba(180,130,210,0.75),rgba(220,140,170,0.75));backdrop-filter:blur(10px);
  border-radius:16px;display:flex;align-items:center;justify-content:center;gap:12px;
  box-shadow:0 4px 20px rgba(180,140,180,0.25);animation:bannerIn 0.6s ease
}
@keyframes bannerIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.guest-banner a{
  color:#fff;background:rgba(255,255,255,0.2);padding:6px 16px;border-radius:20px;
  text-decoration:none;font-weight:700;transition:all 0.3s;border:1px solid rgba(255,255,255,0.3)
}
.guest-banner a:hover{background:rgba(255,255,255,0.35);transform:scale(1.04)}
@keyframes hintPulse{0%,100%{opacity:0.45}50%{opacity:1}}

/* 照片指示器 */
.photo-indicator{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:2}
.photo-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.4);border:none;cursor:pointer;transition:all .3s;padding:0;box-shadow:0 0 6px rgba(0,0,0,0.15)}
.photo-dot.on{background:rgba(255,255,255,0.95);box-shadow:0 0 10px rgba(255,255,255,0.5)}
.photo-dot:hover{background:rgba(255,255,255,0.7)}

/* ============================================ */
/*  个人主页                                     */
/* ============================================ */
.profile-header{
  background:var(--card-bg);backdrop-filter:blur(20px);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:36px;text-align:center;margin-bottom:24px;
}
.ph-avatar{
  width:88px;height:88px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink-soft),var(--purple-soft));
  display:flex;align-items:center;justify-content:center;
  font-size:44px;margin:0 auto 14px;
}
.ph-name{font-size:24px;font-weight:700}
.ph-class{font-size:13px;color:var(--text-light)}
.stats-row{display:flex;justify-content:center;gap:36px;margin-top:20px}
.stat-item{text-align:center}
.stat-num{
  font-size:28px;font-weight:800;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stat-label{font-size:12px;color:var(--text-light)}
.review-list{display:flex;flex-direction:column;gap:14px}
.review-card{
  background:var(--card-bg);backdrop-filter:blur(16px);
  border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:20px 24px;
}
.rc-author{font-size:13px;color:var(--text-light);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.rc-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600}
.rc-tag.anon{background:var(--purple-soft);color:var(--purple)}
.rc-tag.open{background:#e8f5e9;color:#66bb6a}
.rc-strengths,.rc-weaknesses{margin-top:8px}
.rc-strengths .rc-label{font-size:12px;font-weight:700;color:var(--pink);margin-bottom:4px}
.rc-weaknesses .rc-label{font-size:12px;font-weight:700;color:var(--purple);margin-bottom:4px}
.rc-content{font-size:14px;color:var(--text);line-height:1.7}
.rc-time{font-size:11px;color:#c0b8c8;margin-top:10px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-light)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}

/* ============================================ */
/*  写评价弹窗                                   */
/* ============================================ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(40,20,35,0.4);
  backdrop-filter:blur(4px);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);
  padding:36px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;
  animation:modalIn 0.35s ease;
}
@keyframes modalIn{from{opacity:0;transform:translateY(30px)scale(0.95)}to{opacity:1;transform:translateY(0)scale(1)}}
.modal h3{
  font-size:20px;margin-bottom:6px;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.modal .modal-target{font-size:13px;color:var(--text-light);margin-bottom:24px}
.modal label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.modal textarea{
  width:100%;padding:14px;border-radius:var(--radius-sm);
  border:1.5px solid #e0d8e8;font-size:14px;font-family:inherit;
  resize:vertical;min-height:80px;outline:none;margin-bottom:16px;
  transition:border var(--transition);
}
.modal textarea:focus{border-color:var(--purple)}
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;padding:12px 16px;
  background:var(--purple-soft);border-radius:var(--radius-sm);
}
.toggle-label{font-size:13px;font-weight:600}
.toggle-desc{font-size:11px;color:var(--text-light)}
.toggle-switch{position:relative;width:48px;height:26px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;inset:0;cursor:pointer;
  background:#d0c8e0;border-radius:26px;transition:var(--transition);
}
.toggle-slider::before{
  content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:var(--transition);
}
.toggle-switch input:checked+.toggle-slider{background:linear-gradient(135deg,var(--pink),var(--purple))}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(22px)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{background:#f0ecf4;color:var(--text-light);padding:10px 24px;border-radius:24px;border:none;cursor:pointer;font-family:inherit;font-size:14px}
.hidden{display:none!important}
.text-center{text-align:center}
.mt-16{margin-top:16px}
.mb-16{margin-bottom:16px}
.loading{text-align:center;padding:40px;color:var(--text-light);font-size:14px}
.loading::after{content:'...';animation:loadingDots 1.5s steps(4,end) infinite}
@keyframes loadingDots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

/* ============================================ */
/*  照片墙                                       */
/* ============================================ */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-top:16px}
.photo-card{background:var(--card-bg);border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow);transition:all var(--transition)}
.photo-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.photo-card img{width:100%;height:180px;object-fit:cover;display:block}
.photo-card .pc-info{padding:10px 14px}
.photo-card .pc-caption{font-size:13px;color:var(--text)}
.photo-card .pc-uploader{font-size:11px;color:var(--text-light);margin-top:4px}
.photo-card .pc-time{font-size:10px;color:#c0b8c8}
.photo-card img,.photo-card video{cursor:pointer}
.lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer}
.lightbox-overlay img,.lightbox-overlay video{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:24px;color:#fff;font-size:32px;cursor:pointer;z-index:1}
.upload-area{
  background:var(--card-bg);border:2px dashed #e0d8e8;border-radius:var(--radius);
  padding:40px;text-align:center;cursor:pointer;transition:all var(--transition);margin-bottom:24px
}
.upload-area:hover{border-color:var(--pink);background:var(--pink-soft)}
.upload-area .ua-icon{font-size:48px;margin-bottom:12px}
.upload-area .ua-text{font-size:14px;color:var(--text-light)}
.upload-area input[type=file]{display:none}

/* ============================================ */
/*  聊天室                                       */
/* ============================================ */
.chat-box{
  background:var(--card-bg);backdrop-filter:blur(16px);
  border-radius:var(--radius);box-shadow:var(--shadow);
  height:60vh;max-height:500px;display:flex;flex-direction:column;overflow:hidden
}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-msg{display:flex;gap:10px;align-items:flex-start;animation:msgIn 0.3s ease}
.chat-msg.me{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-msg .cm-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff
}
.chat-msg .cm-bubble{
  max-width:70%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word
}
.chat-msg:not(.me) .cm-bubble{background:#f5f0f8;color:var(--text);border-bottom-left-radius:4px}
.chat-msg.me .cm-bubble{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-bottom-right-radius:4px}
.chat-msg .cm-name{font-size:11px;color:var(--text-light);margin-bottom:2px}
.chat-msg .cm-time{font-size:10px;color:#c0b8c8;margin-top:4px;text-align:right}
.cm-read-receipt{font-size:10px;color:#aaa;text-align:right;margin-top:1px}
.chat-input-row{display:flex;gap:10px;padding:12px 16px;border-top:1px solid #f0ecf4}
.chat-input-row input{flex:1;padding:10px 16px;border-radius:24px;border:1.5px solid #e0d8e8;font-size:14px;font-family:inherit;outline:none}
.chat-input-row input:focus{border-color:var(--purple)}
.chat-input-row button{padding:10px 20px;border-radius:24px;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-size:14px;cursor:pointer;font-weight:600}
.chat-empty{text-align:center;padding:40px;color:var(--text-light);font-size:13px}
.nav-badge{position:relative}
.nav-badge::after{content:'';position:absolute;top:-4px;right:-6px;width:10px;height:10px;border-radius:50%;background:#ff4757;box-shadow:0 0 8px rgba(255,71,87,0.6);animation:pulse2 2s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.4}}
.online-dot{width:10px;height:10px;border-radius:50%;background:#4caf50;display:inline-block;box-shadow:0 0 8px rgba(76,175,80,0.5);margin-left:4px}
.dm-header{text-align:center;padding:12px;border-bottom:1px solid #f0ecf4;font-size:14px;font-weight:600}
.dm-inbox-item:hover{background:rgba(255,255,255,0.9)!important;transform:translateX(4px)}

/* ============================================ */
/*  聊天室                                       */
/* ============================================ */
.chat-box{
  background:var(--card-bg);backdrop-filter:blur(16px);
  border-radius:var(--radius);box-shadow:var(--shadow);
  height:60vh;max-height:500px;display:flex;flex-direction:column;overflow:hidden
}

.chat-msg{display:flex;gap:10px;align-items:flex-start;animation:msgIn 0.3s ease}
.chat-msg.me{flex-direction:row-reverse}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-msg .cm-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff
}
.chat-msg .cm-bubble{
  max-width:70%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word
}

.chat-msg.me .cm-bubble{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-bottom-right-radius:4px}
.chat-msg .cm-name{font-size:11px;color:var(--text-light);margin-bottom:2px}
.chat-msg .cm-time{font-size:10px;color:#c0b8c8;margin-top:4px;text-align:right}
.cm-read-receipt{font-size:10px;color:#aaa;text-align:right;margin-top:1px}
.chat-input-row{display:flex;gap:10px;padding:12px 16px;border-top:1px solid #f0ecf4}

async function doRegister() {
  const email = document.getElementById('regEmail').value.trim();
  const pwd = document.getElementById('regPwd').value;
  const name = document.getElementById('regName').value.trim();
  const cls = document.getElementById('regClass').value;
  const avatar = document.getElementById('regAvatar').value;

  if (!email) { showError('请输入邮箱'); return; }
  if (!pwd || pwd.length < 6) { showError('密码至少6位'); return; }
  if (!name) { showError('请输入你的名字'); return; }

  setLoading(true); showError('');
  try {
    // 1. Supabase Auth 注册
    const { data: authData, error: authError } = await sb.auth.signUp({ email, password: pwd });

    // 检查是否邮箱已存在
    if (authError) {
      if (authError.message.includes('already')) {
        showError('该邮箱已被注册，请切换到"登录"标签');
      } else {
        showError(authError.message);
      }
      setLoading(false);
      return;
    }

    if (!authData.user) {
      // 邮箱确认已禁用，应该不会出现这种情况
      showError('注册失败，请稍后重试');
      setLoading(false);
      return;
    }

    // 2. 确保 session 生效
    if (authData.session) {
      await sb.auth.setSession(authData.session);
    }

    // 3. 匹配预置学生 — 如果名字一样就认领种子账号
    let student;
    const { data: matched } = await sb.from('students')
      .select('*').eq('name', name).eq('is_seed', true).is('auth_id', null).single();

    if (matched) {
      // 认领种子账号
      const { data: updated, error: updateError } = await sb.from('students')
        .update({ auth_id: authData.user.id, is_seed: false, cls, avatar })

      if (updateError) {
        showError('认领账号失败: ' + updateError.message);
        setLoading(false);
        return;
      }
      student = updated;
    } else {
      // 没有匹配的预置学生，创建新记录

        .insert({ auth_id: authData.user.id, name, cls, avatar, email: email })

        showError('创建用户信息失败: ' + insertError.message);

        return;
      }
      student = newStudent;
    }

    setLoading(false);
    await render();
  } catch (e) {
    showError('网络错误，请稍后再试');
    setLoading(false);

/* ---- 星球引擎 ---- */
let sRAF = null, sRotY = 0, sRotX = 0.35, sAuto = true, sHover = -1, sMx = 0, sMy = 0, sPts = [], sCache = [];
let sTouchStart = null, sTouchLast = null;

function endSphere() { if (sRAF) { cancelAnimationFrame(sRAF); sRAF = null; } sHover = -1; sAuto = true; }
function startPresence() {
  if (_heartbeatTimer) return; // 已在运行中

  async function tick() {
    if (!me) return;
    try {
      // 更新在线心跳
      var now = new Date().toISOString();
      await sb.from('students').update({ last_email_notified: now }).eq('id', me.id);
      // 查询在线用户（45秒内有心跳的）
      var cutoff = new Date(Date.now() - 45000).toISOString();
      var resp = await sb.from('students').select('id').gte('last_email_notified', cutoff);
      _onlineUsers = {};
      (resp.data || []).forEach(function(s) { _onlineUsers[s.id] = true; });
    } catch(e) {}
  }

  tick(); // 立即执行一次
  _heartbeatTimer = setInterval(tick, 20000); // 每20秒一次
}
function stopPresence() {
  if (_heartbeatTimer) { clearInterval(_heartbeatTimer); _heartbeatTimer = null; }
  _onlineUsers = {};
}
async function checkUnreadDM() {
  if (!me) return;
  try {
    var resp = await sb.from('direct_messages').select('id', { count: 'exact', head: true }).eq('receiver_id', me.id).eq('read', false);

function initSphere(students) {
  endSphere();
  const wrap = document.getElementById('sphereWrap');
  const cvs = document.getElementById('sphereCvs');
  if (!wrap || !cvs) return;
  const dpr = Math.min(devicePixelRatio || 1, 2);
  const rect = wrap.getBoundingClientRect();
  const S = rect.width;
  cvs.width = S * dpr; cvs.height = S * dpr;
  cvs.style.width = S + 'px'; cvs.style.height = S + 'px';

  const n = students.length;
  const R = S * (window.innerWidth < 600 ? 0.44 : 0.35);
  const phi = Math.PI * (3 - Math.sqrt(5));

  sPts = students.map((s, i) => {
    let y, ry, th;
    if (n === 1) { y = 0; ry = 1; th = 0; }
    else { y = 0.85 - (i / (n - 1)) * 1.7; ry = Math.sqrt(1 - y * y); th = phi * i; }
    return { student: s, bx: Math.cos(th) * ry * R, by: y * R, bz: Math.sin(th) * ry * R };
  });

  function getCanvasXY(clientX, clientY) {
    const r = cvs.getBoundingClientRect();
    return {
      x: (clientX - r.left) * (cvs.width / r.width),
      y: (clientY - r.top) * (cvs.height / r.height)
    };
  }
  cvs.onmousemove = e => {
    const p = getCanvasXY(e.clientX, e.clientY);
    sMx = p.x; sMy = p.y;
  };
  cvs.onmouseleave = () => { sMx = -999; sMy = -999; sAuto = true; sHover = -1; };
  // 手机触控
  cvs.addEventListener('touchstart', e => {
    const t = e.touches[0];
    if (t) {
      sTouchStart = { x: t.clientX, y: t.clientY, rotY: sRotY, rotX: sRotX }; sTouchLast = sTouchStart; sAuto = false;
      // 立即更新触摸坐标，让 hover 检测生效
      const rect = cvs.getBoundingClientRect();
      sMx = (t.clientX - rect.left) * (cvs.width / rect.width);
      sMy = (t.clientY - rect.top) * (cvs.height / rect.height);
    }
  }, { passive: true });
  cvs.addEventListener('touchmove', e => {
    if (!sTouchStart) return;
    const t = e.touches[0];
    if (t) {
      const dx = t.clientX - sTouchStart.x;
      const dy = t.clientY - sTouchStart.y;
      sRotY = sTouchStart.rotY + dx * 0.005;
      sRotX = Math.max(-0.8, Math.min(0.8, sTouchStart.rotX + dy * 0.005));
      sMx = (t.clientX - cvs.getBoundingClientRect().left) * (cvs.width / cvs.getBoundingClientRect().width);
      sMy = (t.clientY - cvs.getBoundingClientRect().top) * (cvs.height / cvs.getBoundingClientRect().height);
      sTouchLast = { x: t.clientX, y: t.clientY };
    }
  }, { passive: true });
  cvs.addEventListener('touchend', () => {
    if (sTouchStart && sTouchLast) {
      const dx = sTouchLast.x - sTouchStart.x;
      const dy = sTouchLast.y - sTouchStart.y;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
        // 直接计算点击到了哪个头像（不等动画帧）
        const rect = cvs.getBoundingClientRect();
        const cx = (sTouchLast.x - rect.left) * (cvs.width / rect.width);
        const cy = (sTouchLast.y - rect.top) * (cvs.height / rect.height);
        for (let i = sCache.length - 1; i >= 0; i--) {
          const p = sCache[i];
          if (Math.hypot(cx - p.sx, cy - p.sy) < 28 * p.scale) {
            if (p.student) {
              if (!me) showGuestModal();
              else openProfile(p.student.id);
            }
            break;
          }
        }
      }
    }
    sTouchStart = null; sTouchLast = null;
    sMx = -999; sMy = -999; sAuto = true; sHover = -1;
  });
  cvs.onclick = () => {
    if (sHover >= 0 && sHover < sCache.length) {
      const p = sCache[sHover];
      if (p && p.student) {
        if (!me) {
          // 游客弹窗提示
          showGuestModal();
        } else {
          openProfile(p.student.id);
        }
      }
    }
  };

  animateSphere(cvs, S, dpr);
}

/* ---- 照片背景 ---- */
let _photoData = { timer: null, idx: 0, photos: [], container: null, dots: null };

function switchToPhoto(n) {
  const d = _photoData;
  if (!d.container || !d.photos.length) return;
  const all = d.container.children;
  if (!all[d.idx]) return;
  all[d.idx].classList.remove('on');
  if (d.dots && d.dots[d.idx]) d.dots[d.idx].classList.remove('on');
  d.idx = ((n % d.photos.length) + d.photos.length) % d.photos.length;
  all[d.idx].classList.add('on');
  if (d.dots && d.dots[d.idx]) d.dots[d.idx].classList.add('on');
  clearInterval(d.timer);
  d.timer = setInterval(() => switchToPhoto(d.idx + 1), 3000);
}

/* ---- 动画循环 ---- */
function animateSphere(cvs, S, dpr) {
  const ctx = cvs.getContext('2d');
  const W = cvs.width, H = cvs.height, cx = W / 2, cy = H / 2, P = S * 0.8;

  if (sAuto) sRotY += 0.003;

  ctx.clearRect(0, 0, W, H);

  const cY = Math.cos(sRotY), sY = Math.sin(sRotY);
  const cX = Math.cos(sRotX), sX = Math.sin(sRotX);
  function rot(bx, by, bz) {
    const rx = bx * cY - bz * sY, rz = bx * sY + bz * cY;
    return { x: rx, y: by * cX - rz * sX, z: by * sX + rz * cX };
  }

  sCache = sPts.map(pt => {
    const r = rot(pt.bx, pt.by, pt.bz);
    const sc = P / (P + r.z);
    return { student: pt.student, sx: cx + r.x * sc, sy: cy + r.y * sc, depth: r.z, scale: sc };
  });

  sCache.sort((a, b) => a.depth - b.depth);

  sHover = -1;
  for (let i = sCache.length - 1; i >= 0; i--) {
    const p = sCache[i];
    if (Math.hypot(sMx - p.sx, sMy - p.sy) < 28 * p.scale) { sHover = i; sAuto = false; break; }
  }
  if (sHover < 0) sAuto = true;

  sCache.forEach((p, i) => {
    const hov = i === sHover;
    const r = (hov ? 38 : 23) * p.scale;
    const isMe = me && p.student.id === me.id;

    if (hov) {
      const gl = ctx.createRadialGradient(p.sx, p.sy, r * 0.2, p.sx, p.sy, r * 2.8);
      gl.addColorStop(0, 'rgba(255,200,220,0.5)');
      gl.addColorStop(0.5, 'rgba(200,170,215,0.12)');
      gl.addColorStop(1, 'rgba(150,130,180,0)');
      ctx.fillStyle = gl; ctx.beginPath(); ctx.arc(p.sx, p.sy, r * 2.8, 0, Math.PI * 2); ctx.fill();
    }

    const ag = ctx.createRadialGradient(p.sx - r * 0.15, p.sy - r * 0.2, r * 0.04, p.sx, p.sy, r);
    if (isMe) {
      ag.addColorStop(0, 'rgba(255,245,248,0.92)');
      ag.addColorStop(0.7, 'rgba(255,205,225,0.7)');
      ag.addColorStop(1, 'rgba(220,170,200,0.45)');
    } else if (hov) {
      ag.addColorStop(0, 'rgba(255,255,255,0.9)');
      ag.addColorStop(0.7, 'rgba(240,215,230,0.65)');
      ag.addColorStop(1, 'rgba(190,160,200,0.4)');
    } else {
      ag.addColorStop(0, 'rgba(255,255,255,0.72)');
      ag.addColorStop(0.7, 'rgba(235,215,228,0.48)');
      ag.addColorStop(1, 'rgba(180,150,190,0.25)');
    }
    ctx.fillStyle = ag; ctx.beginPath(); ctx.arc(p.sx, p.sy, r, 0, Math.PI * 2); ctx.fill();

    if (isMe) { ctx.strokeStyle = 'rgba(255,180,200,0.65)'; ctx.lineWidth = 2; }
    else if (hov) { ctx.strokeStyle = 'rgba(255,255,255,0.65)'; ctx.lineWidth = 2; }
    else { ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 0.7; }
    ctx.stroke();

    // 头像 — 用名字首字 + 彩色背景（兼容所有设备）
    const colors = ['#ff9eb0','#ffb088','#ffd980','#b8e0a0','#88c8e8','#b0a0e8','#e8a0d0','#80d0c0',
                    '#f0b0b0','#c0c0e0','#b0d0b0','#e0c080','#a0c8e0','#e0a0a0','#90c8b0','#d0a8d8'];
    // 罗春燕是老师，用"师"区分吴燕的"燕"
    var isTeacher = p.student.id === 's_c010bbc5fcb74f1aa96c3e8f547241bd';
    const lastName = isTeacher ? '师' : p.student.name.charAt(p.student.name.length - 1);
    const ci = lastName.charCodeAt(0) % colors.length;
    ctx.fillStyle = colors[ci];
    ctx.beginPath(); ctx.arc(p.sx, p.sy, r*0.78, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    const fs = r * 0.85;
    ctx.font = `bold ${fs}px "PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(lastName, p.sx, p.sy + 1);

    // 在线绿点
    if (_onlineUsers[p.student.id]) {
      ctx.fillStyle = '#4caf50';
      ctx.beginPath(); ctx.arc(p.sx + r*0.55, p.sy - r*0.7, r*0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(76,175,80,0.3)';
      ctx.beginPath(); ctx.arc(p.sx + r*0.55, p.sy - r*0.7, r*0.35, 0, Math.PI*2); ctx.fill();
    }

    // 通知光效
    const acts = _actCache[p.student.id];
    if (acts && acts.length > 0) {
      const hasNew = acts.some(a => !a.seen);
      if (hasNew) {
        const ng = ctx.createRadialGradient(p.sx, p.sy - r*0.8, 0, p.sx, p.sy - r*0.8, r*0.6);
        ng.addColorStop(0, 'rgba(255,220,80,0.9)');
        ng.addColorStop(0.5, 'rgba(255,180,50,0.4)');
        ng.addColorStop(1, 'rgba(255,150,30,0)');
        ctx.fillStyle = ng; ctx.beginPath(); ctx.arc(p.sx, p.sy - r*0.8, r*0.55, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffe066';
        ctx.font = `bold ${10*p.scale}px "Segoe UI Emoji"`;
        ctx.fillText('🔔', p.sx, p.sy - r*0.8 + 1);
      }
    }

    // 评价数量徽章（右下角）
    var rc = _reviewCounts[p.student.id];
    if (rc && rc > 0) {
      var bw = Math.max(16 * p.scale, 11);
      var bh = Math.max(13 * p.scale, 9);
      var bx = p.sx + r * 0.58;
      var by = p.sy + r * 0.58;
      ctx.fillStyle = 'rgba(255,107,107,0.9)';
      ctx.beginPath();
      ctx.moveTo(bx - bw/2 + 5*p.scale, by - bh/2);
      ctx.lineTo(bx + bw/2 - 5*p.scale, by - bh/2);
      ctx.quadraticCurveTo(bx + bw/2, by - bh/2, bx + bw/2, by - bh/2 + 5*p.scale);
      ctx.lineTo(bx + bw/2, by + bh/2 - 5*p.scale);
      ctx.quadraticCurveTo(bx + bw/2, by + bh/2, bx + bw/2 - 5*p.scale, by + bh/2);
      ctx.lineTo(bx - bw/2 + 5*p.scale, by + bh/2);
      ctx.quadraticCurveTo(bx - bw/2, by + bh/2, bx - bw/2, by + bh/2 - 5*p.scale);
      ctx.lineTo(bx - bw/2, by - bh/2 + 5*p.scale);
      ctx.quadraticCurveTo(bx - bw/2, by - bh/2, bx - bw/2 + 5*p.scale, by - bh/2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      var bfs = Math.max(9 * p.scale, 7);
      ctx.font = 'bold ' + bfs + 'px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(rc > 99 ? '99+' : String(rc), bx, by + 0.5);
    }

    if (isMe && !hov) {
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.font = `bold ${9 * p.scale}px "PingFang SC","Microsoft YaHei",sans-serif`;
      ctx.fillText('我', p.sx, p.sy + r + 11);
    }

    if (hov) {
      const ny = p.sy + r + 16;
      // 获取评价数 — 从缓存数据，避免异步
      const label = isMe ? `${p.student.name}（我）` : p.student.name;
      const m = ctx.measureText(label);
      const tw = m.width + 24; const th = 34;
      const bx = p.sx - tw / 2, by = ny - 11;

      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath();
      ctx.moveTo(bx + 10, by); ctx.lineTo(bx + tw - 10, by);
      ctx.quadraticCurveTo(bx + tw, by, bx + tw, by + 10);
      ctx.lineTo(bx + tw, by + th - 10);
      ctx.quadraticCurveTo(bx + tw, by + th, bx + tw - 10, by + th);
      ctx.lineTo(bx + 10, by + th);
      ctx.quadraticCurveTo(bx, by + th, bx, by + th - 10);
      ctx.lineTo(bx, by + 10);
      ctx.quadraticCurveTo(bx, by, bx + 10, by);
      ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.font = `bold 12.5px "PingFang SC","Microsoft YaHei",sans-serif`;
      ctx.fillText(label, p.sx, ny + 2);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = `10px "PingFang SC","Microsoft YaHei",sans-serif`;
      ctx.fillText("🎓 "+p.student.cls, p.sx, ny + 16);
    }
  });

  sRAF = requestAnimationFrame(() => animateSphere(cvs, S, dpr));
}

        ${r.weaknesses ? `<div class="rc-weaknesses"><div class="rc-label">💡 可以更好的地方</div><div class="rc-content">${r.weaknesses.replace(/\n/g, '<br>')}</div></div>` : ''}

        <div class="stat-item"><div class="stat-num">${wc}</div><div class="stat-label">💡 待改进</div></div>
        <div class="stat-item"><div class="stat-num">${rvs.length}</div><div class="stat-label">📝 总评价</div></div>

      ${isMe ? `<p class="mt-16" style="font-size:12px;color:var(--text-light)">这是你的主页，大家给你的评价会显示在这里</p>
      <button class="btn btn-outline mt-16" onclick="changePassword()" style="font-size:12px">🔑 修改密码</button>` : ''}
      ${s.is_seed ? `<p class="mt-16" style="font-size:11px;color:var(--text-light)">⚠️ 这是预置学生，不可登录。注册你自己的账号来写评价吧~</p>` : ''}
    </div>
    ${isMe ? `
    <div style="margin-top:24px">
      <div class="section-title" style="font-size:16px;font-weight:700;margin-bottom:4px">📷 我的媒体墙</div>
      <p style="text-align:center;font-size:12px;color:var(--text-light);margin-bottom:12px">分享照片和视频到你的主页</p>
      <div class="upload-area" id="mediaUploadArea" style="margin-bottom:16px">
        <div class="ua-icon">📤</div>
        <div class="ua-text">点击上传照片/视频（最大50MB）</div>
        <input type="file" id="mediaFile" multiple>
      </div>
      <div id="myMediaGrid"></div>

    loadMyMedia();

    setTimeout(() => {
      const mua = document.getElementById('mediaUploadArea');
      const mf = document.getElementById('mediaFile');
      if (mua && mf) {
        mua.onclick = () => mf.click();
        mf.onchange = async (e) => {
          const files = e.target.files; if (!files || files.length === 0) return;
          mua.innerHTML = '<div class="ua-icon">⏳</div><div class="ua-text">上传中...</div>';
          let done = 0;
          for (let fi = 0; fi < files.length; fi++) {
            const file = files[fi];
            if (file.size > 50*1024*1024) { alert(file.name + ' 超过 50MB，已跳过'); done++; continue; }
            const isVideo = file.type.startsWith('video/');
            const fn = Date.now() + '_' + fi + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const { error: upErr } = await sb.storage.from('yearbook-assets').upload('media/' + fn, file);
            if (upErr) { console.error('upload error:', upErr); done++; continue; }
            const { data: urlData } = sb.storage.from('yearbook-assets').getPublicUrl('media/' + fn);
            await sb.from('photos').insert({ uploader_id: me.id, student_id: me.id, url: urlData.publicUrl, caption: isVideo ? '🎬 视频' : '📷 照片', type: isVideo ? 'video' : 'photo' });
            await sb.from('activities').insert({ student_id: me.id, type: isVideo ? 'video' : 'photo', message: me.name + ' 上传了新的' + (isVideo ? '视频' : '照片'), related_id: me.id });
            done++;
          }
          loadMyMedia();
          mua.innerHTML = '<div class="ua-icon">📤</div><div class="ua-text">上传了 ' + done + ' 个文件</div>';
        };
      }
    }, 100);
  }
}

async function loadMyMedia() {

async function deleteMedia(id) {
  if (!confirm('确定删除？')) return;
  const { data: media } = await sb.from('photos').select('url').eq('id', id).single();
  if (media) {
    const path = media.url.split('/').slice(-2).join('/');
    try { await sb.storage.from('yearbook-assets').remove([path]); } catch(e) {}
  }
  await sb.from('photos').delete().eq('id', id);
  loadMyMedia();
}
function showLightbox(url, isVideo) {
  var overlay = document.createElement('div');
  overlay.className = 'lightbox-overlay';
  overlay.onclick = function() { overlay.remove(); };
  if (isVideo) {
    overlay.innerHTML = '<video src="' + url + '" controls autoplay style="max-width:95vw;max-height:95vh;border-radius:8px"></video>';
  } else {
    overlay.innerHTML = '<img src="' + url + '" style="max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px">';
  }
  document.body.appendChild(overlay);
}
async function deletePhoto(id) {

  const { data: photo } = await sb.from('photos').select('url').eq('id', id).single();

    const path = photo.url.split('/').slice(-2).join('/');

  await sb.from('photos').delete().eq('id', id);
  renderPhotos();
}

async function renderDMInbox() {
  if (!me) { goGuestLogin(); return; }
  endDM();
  endChat();

  // 获取所有涉及我的私信
  var resp = await sb.from('direct_messages').select('*')
    .or('sender_id.eq.' + me.id + ',receiver_id.eq.' + me.id)
    .order('created_at', { ascending: false }).limit(200);

  var msgs = resp.data || [];
  // 按对话对象分组
  var convos = {};
  msgs.forEach(function(m) {
    var partnerId = m.sender_id === me.id ? m.receiver_id : m.sender_id;
    if (!convos[partnerId]) {
      convos[partnerId] = { partnerId: partnerId, partnerName: m.sender_id === me.id ? null : (m.sender_name || null), lastMsg: m, unread: 0 };
    }
    if (m.sender_id === partnerId && !m.read) convos[partnerId].unread++;
    if (m.created_at > convos[partnerId].lastMsg.created_at) convos[partnerId].lastMsg = m;
  });

  // 获取对话对象的名字（对于对方发的消息sender_name可能不准确，需要查students表）
  var partnerIds = Object.keys(convos);
  var studentsMap = {};
  if (partnerIds.length > 0) {
    var sResp = await sb.from('students').select('id,name,avatar').in('id', partnerIds);
    (sResp.data || []).forEach(function(s) { studentsMap[s.id] = s; });
  }

  var colors = ['#ff9eb0','#ffb088','#88c8e8','#b0a0e8','#e8a0d0','#80d0c0','#f0b0b0','#b8e0a0','#c0c0e0','#d0a8d8'];
  var html = '<a href="yearbook.html" class="btn btn-back mb-16" style="text-decoration:none" onclick="backToHall();return false;">← 返回大厅</a>'
    + '<div class="section-title" style="font-size:18px;font-weight:700;margin-bottom:16px">📨 我的私信</div>';

  if (partnerIds.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">📭</div><p>还没有私信</p><p style="font-size:12px;color:var(--text-light)">点击同学主页中的「💬 私聊」按钮发起对话</p></div>';
  } else {
    html += '<div style="display:flex;flex-direction:column;gap:8px">';
    var sortedPartners = partnerIds.sort(function(a, b) {
      return new Date(convos[b].lastMsg.created_at) - new Date(convos[a].lastMsg.created_at);
    });
    sortedPartners.forEach(function(pid) {
      var c = convos[pid];
      var s = studentsMap[pid] || { name: c.partnerName || '未知', avatar: '👤' };
      var ci = (s.name || '?').charCodeAt(0) % colors.length;
      var t = new Date(c.lastMsg.created_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      var preview = (c.lastMsg.content || '').substring(0, 50);
      if (c.lastMsg.content && c.lastMsg.content.length > 50) preview += '...';
      var badge = c.unread > 0 ? '<span style="background:#ff4757;color:#fff;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:6px">' + c.unread + '</span>' : '';
      html += '<div data-dm-partner="' + pid + '" class="dm-inbox-item" style="display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,0.75);border-radius:14px;cursor:pointer;transition:all 0.2s;' + (c.unread > 0 ? 'border-left:3px solid #ff4757;' : '') + '">'
        + '<div style="width:40px;height:40px;border-radius:50%;background:' + colors[ci] + ';display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;flex-shrink:0">' + s.name.charAt(s.name.length - 1) + '</div>'
        + '<div style="flex:1;min-width:0">'
        + '<div style="display:flex;align-items:center;justify-content:space-between">'
        + '<span style="font-weight:600;font-size:15px;color:var(--text)">' + s.name + badge + '</span>'
        + '<span style="font-size:11px;color:#c0b8c8">' + t + '</span>'
        + '</div>'
        + '<div style="font-size:13px;color:#8a7f92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">' + preview.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>'
        + '</div></div>';
    });
    html += '</div>';
  }

  document.getElementById('view').innerHTML = html;
  checkUnreadDM();
}

var _quizData = []; var _quizIdx = 0; var _quizScore = 0; var _quizTimer = 0; var _quizInterval = null;

async function renderQuiz() {
  _gameMode = 'quiz';
  if (!me) { goGuestLogin(); return; }
  // 获取真实评价数据
  var resp = await sb.from('reviews').select('id,strengths,target_id').not('strengths','is',null).neq('strengths','').order('created_at',{ascending:false}).limit(50);
  var allRevs = (resp.data||[]).filter(function(r){ return r.strengths && r.strengths.length > 4; });
  // 获取学生
  var sResp = await sb.from('students').select('id,name').limit(52);
  var students = sResp.data || [];
  var sMap = {}; students.forEach(function(s){ sMap[s.id] = s; });
  // 取10题
  _quizData = []; _quizIdx = 0; _quizScore = 0; _quizTimer = 0;
  for (var i = 0; i < Math.min(10, allRevs.length); i++) {
    var rev = allRevs[Math.floor(Math.random()*allRevs.length)];
    var correct = sMap[rev.target_id];
    if (!correct) { i--; continue; }
    var options = [correct];
    var used = {}; used[correct.id] = true;
    while (options.length < 4) {
      var rnd = students[Math.floor(Math.random()*students.length)];
      if (!used[rnd.id]) { used[rnd.id] = true; options.push(rnd); }
    }
    // 洗牌选项
    for (var j=options.length-1;j>0;j--){var k=Math.floor(Math.random()*(j+1));var t=options[j];options[j]=options[k];options[k]=t;}
    _quizData.push({review: rev, correct: correct, options: options});
  }
  showQuizQuestion();
}

function showQuizQuestion() {
  if (_quizIdx >= _quizData.length) { endQuiz(); return; }
  var q = _quizData[_quizIdx];
  if (_quizInterval) clearInterval(_quizInterval);
  _quizTimer = 0;
  var html = '<a href="yearbook.html" class="btn btn-back mb-16" style="text-decoration:none" onclick="_gameMode=\'lobby\';renderGame();return false;">← 游戏大厅</a>'

    + '<div style="background:rgba(255,255,255,0.75);border-radius:16px;padding:20px;text-align:center;margin-bottom:16px;max-width:400px;margin-left:auto;margin-right:auto">'

    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:340px;margin:0 auto">';
  var colors = ['#ff9eb0','#ffb088','#88c8e8','#b0a0e8','#e8a0d0','#80d0c0'];
  q.options.forEach(function(s,si){
    var ci = s.name.charCodeAt(s.name.length-1) % colors.length;
    html += '<div onclick="window._quizAnswer(\''+s.id+'\')" class="quiz-option" style="background:rgba(255,255,255,0.8);border-radius:14px;padding:14px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px">'
      + '<div style="width:40px;height:40px;border-radius:50%;background:'+colors[ci]+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700">'+s.name.charAt(s.name.length-1)+'</div>'
      + '<span style="font-size:13px;font-weight:600;color:var(--text)">'+s.name+'</span></div>';
  });
  html += '</div>';
  document.getElementById('view').innerHTML = html;
  _quizInterval = setInterval(function(){ _quizTimer++; var el=document.getElementById('quizTimerEl'); if(el) el.textContent='⏱ '+_quizTimer+'s'; }, 1000);
  window._quizAnswer = function(sid) {
    var q = _quizData[_quizIdx];

    if (isCorrect) {

          if (dareEl) dareEl.textContent = '💪 大冒险：' + dareText;
          btn.textContent = '🎲 再来一次';
          _tdState = 'idle';
        }
      } else {
        _tdTimer = setTimeout(tick, speed);
      }
    }
    tick();
  };
}

      var t = new Date(m.created_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      var readBadge = '';
      if (isMe) {
        var rdc = readCounts[m.id] || 0;
        if (rdc > 0) readBadge = '<div class="cm-read-receipt">已读 ' + rdc + '</div>';
      }
      html += '<div class="chat-msg' + (isMe ? ' me' : '') + '">'
        + '<div class="cm-avatar" style="background:' + colors[ci] + '">' + nm.charAt(nm.length-1) + '</div>'
        + '<div><div class="cm-name">' + (isMe ? '我' : nm) + '</div>'
        + '<div class="cm-bubble">' + m.content.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>'
        + '<div class="cm-time">' + t + '</div>' + readBadge + '</div></div>';
    }
    container.innerHTML = html || '<p style="text-align:center;color:#8a7f92;padding:20px">还没有消息，来发第一条吧 ✨</p>';
    if (wasAtBottom || msgs.length <= 2) container.scrollTop = container.scrollHeight;
  }

  loadChat();
  window._chatPollTimer = setInterval(loadChat, 2000);

  var sendMsg = async function() {
    var input = document.getElementById('chatInput');
    if (!input) return;
    var content2 = input.value.trim();
    if (!content2) return;
    input.value = '';
    input.disabled = true;
    await sb.from('messages').insert({ sender_id: me.id, sender_name: me.name, content: content2 });
    _lastChatStamp = ''; // 重置，让下一次 loadChat 强制刷新
    input.disabled = false;
    input.focus();
    loadChat();
  };

  document.getElementById('chatSend').onclick = sendMsg;
  document.getElementById('chatInput').onkeydown = function(e) { if (e.key === 'Enter') sendMsg(); };
}

function endChat() { try { if (window._chatPollTimer) { clearInterval(window._chatPollTimer); window._chatPollTimer = null; } } catch(e) {} }

  // 可见范围切换

  (async () => {
    const allStudents = await fetchStudents();
    const selList = overlay.querySelector('#rvSelectedList');
    selList.innerHTML = allStudents
      .filter(st => st.id !== me.id)
      .map(st => `<label style="font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;background:#f8f4fa;padding:3px 8px;border-radius:10px"><input type="checkbox" value="${st.id}"> ${st.avatar} ${st.name}</label>`)

async function renderPhotos() {
  // 1. 从 photos 表获取
  const { data: dbPhotos, error } = await sb.from('photos')
    .select('*, uploader:uploader_id(name,avatar)')
    .order('created_at', { ascending: false });

  let photos = (dbPhotos || []).map(p => ({...p, source: 'db'}));
  photos.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  if (error) {
    document.getElementById('view').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>加载照片失败</p></div>';
    return;
  }

  let photosHTML = '';
  if (!photos || photos.length === 0) {
    photosHTML = '<div class="empty-state"><div class="empty-icon">📷</div><p>还没有照片</p><p style="font-size:12px">来做第一个上传的人吧 ✨</p></div>';
  } else {
    photosHTML = '<div class="photo-grid">' + photos.map(p => {
      const t = new Date(p.created_at).toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      const uploaderName = p.uploader ? p.uploader.name : '未知';
      const canDelete = me && (p.uploader_id === me.id || me.id === 's24' || !p.uploader_id);
      const isVid = p.type === 'video';
      return `<div class="photo-card" style="position:relative">
        ${isVid ? `<video src="${p.url}" controls style="width:100%;height:180px;object-fit:cover;display:block"></video>` : `<img src="${p.url}" alt="${p.caption||''}" loading="lazy" style="width:100%;height:180px;object-fit:cover;display:block;cursor:pointer">`}
        ${canDelete ? `<button onclick="deletePhoto('${p.id}')" style="position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;border:none;background:rgba(0,0,0,0.5);color:#fff;font-size:14px;cursor:pointer;line-height:24px;text-align:center;z-index:2" title="删除">✕</button>` : ''}
        <div class="pc-info">
          ${p.caption ? `<div class="pc-caption">${p.caption}</div>` : ''}
          <div class="pc-uploader">📤 ${uploaderName}</div>
          <div class="pc-time">${t}</div>
        </div>
      </div>`;
    }).join('') + '</div>';
  }

  document.getElementById('view').innerHTML = `
    <a href="yearbook.html" class="btn btn-back mb-16" style="text-decoration:none">← 返回大厅</a>
    <div class="section-title" style="font-size:18px;font-weight:700;margin-bottom:4px">📷 我们的照片墙</div>
    <p style="text-align:center;font-size:13px;color:var(--text-light);margin-bottom:16px">记录我们的青春瞬间</p>
    ${me ? `
    <div class="upload-area" id="uploadArea">
      <div class="ua-icon">📤</div>
      <div class="ua-text">点击上传照片/视频（最大50MB）</div>
      <input type="file" id="photoFile" multiple>
    </div>
    ` : '<p style="text-align:center;font-size:12px;color:var(--text-light);margin-bottom:16px">登录后即可上传照片</p>'}
    ${photosHTML}
  `;

  // 绑定上传事件
  if (me) {
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('photoFile');
    if (uploadArea && fileInput) {
      uploadArea.onclick = () => fileInput.click();
      fileInput.onchange = async (e) => {
        const files = e.target.files;
        if (!files || files.length === 0) return;

        const caption = files.length === 1 ? prompt('给照片加个描述（可选）：') : '';
        uploadArea.innerHTML = '<div class="ua-icon">⏳</div><div class="ua-text">上传中...</div>';

        let done = 0;
        for (let fi = 0; fi < files.length; fi++) {
          const file = files[fi];
          if (file.size > 50 * 1024 * 1024) { alert(file.name + ' 超过 50MB，已跳过'); done++; continue; }

          const fileName = Date.now() + '_' + fi + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');

          const { error: uploadError } = await sb.storage
            .from('yearbook-assets')
            .upload('photos/' + fileName, file);

          if (uploadError) { console.error('upload error:', uploadError); done++; continue; }

          const isVideo = file.type.startsWith('video/');
          const { data: urlData } = sb.storage.from('yearbook-assets').getPublicUrl('photos/' + fileName);

          await sb.from('photos').insert({
            uploader_id: me.id,
            url: urlData.publicUrl,
            caption: caption || (isVideo ? '🎬 视频' : '📷 照片'),
            type: isVideo ? 'video' : 'photo'
          });
          done++;
        }

        uploadArea.innerHTML = '<div class="ua-icon">📤</div><div class="ua-text">上传了 ' + done + ' 张照片</div>';
        await renderPhotos();
      };
    }
  }
}

/* ============================================ */
/*  启动 — 恢复 Session                         */
/* ============================================ */
async function init() {
  // 检查 SDK 是否加载
  if (!sb || !sb.from) {
    document.getElementById('view').innerHTML = '<div class="empty-state"><div class="empty-icon">🔌</div><p>SDK 加载失败</p><p style="font-size:12px">请检查网络连接后刷新页面</p></div>';
    return;
  }

  try {
    // 1. 尝试恢复登录 session (添加超时)
    const sessionPromise = sb.auth.getSession();
    const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000));

    let session;
    try {
      const result = await Promise.race([sessionPromise, timeoutPromise]);
      session = result.data.session;
    } catch (e) {
      document.getElementById('view').innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>连接服务器超时</p><p style="font-size:12px">请检查网络或刷新重试</p></div>';
      return;
    }

    if (session) {
      const { data: student, error } = await sb.from('students')
        .select('*').eq('auth_id', session.user.id).single();
      if (student && !error) {
        me = student;
        view = 'hall';
      }
    }

    // 2. 监听 auth 状态变化
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // 密码重置回调：弹出新密码输入框
        var newPwd = prompt('请输入新密码（至少6位）：');
        if (newPwd && newPwd.length >= 6) {
          try {
            var resp2 = await sb.auth.updateUser({ password: newPwd });
            if (resp2.error) { alert('重置失败：' + resp2.error.message); }
            else { alert('密码修改成功！请重新登录。'); me = null; view = 'login'; viewing = null; await render(); }
          } catch(e) { alert('重置失败，请重试'); }
        } else if (newPwd) {
          alert('密码至少需要6位字符');
        }
      }
      if (event === 'SIGNED_OUT') {
        stopPresence();
        me = null; view = 'login'; viewing = null;
        await render();
      } else if (event === 'SIGNED_IN' && session) {
        const { data: student } = await sb.from('students')
          .select('*').eq('auth_id', session.user.id).single();
        if (student) {
          me = student; view = 'hall'; viewing = null;
          await render();
        }
      }
    });

    // 3. 首次渲染
    await render();
  } catch (e) {
    console.error('Init error:', e);
    document.getElementById('view').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>初始化失败</p><p style="font-size:12px">请刷新页面重试</p></div>';
  }
}

document.getElementById('view').innerHTML = '<div class="loading">初始化中...</div>';

});
init();
